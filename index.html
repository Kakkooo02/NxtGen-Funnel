<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>NxtGen Quiz</title>

  <style>
    :root {
      --navy: #000125;
      --surface: #0d1a4a;
      --royal: #16295c;
      --elevated: #1e3a7a;
      --aqua: #6de2eb;
      --aqua-light: #c8f9fc;
      --warm-grey: #efeeec;
      --white: #ffffff;
      --ink: #08092c;
      --error: #ff7b7b;

      --font:
        "HK Grotesk Pro",
        "HK Grotesk",
        Arial,
        sans-serif;

      --header-height: 96px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      font-family: var(--font);
      color: var(--white);
      background: var(--navy);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    textarea:focus-visible,
    a:focus-visible {
      outline: 2px solid var(--aqua);
      outline-offset: 3px;
    }

    /* =====================================
       HEADER
    ===================================== */

    .site-header {
      position: fixed;
      z-index: 100;

      top: 0;
      left: 0;
      right: 0;

      height: var(--header-height);

      display: flex;
      align-items: center;

      padding:
        14px
        clamp(20px, 4vw, 58px);

      pointer-events: none;
    }

    .logo-link {
      display: block;
      line-height: 0;
      pointer-events: auto;
    }

    .logo {
      display: block;

      width: clamp(155px, 16vw, 225px);
      height: auto;
    }

    /* =====================================
       SCREEN SYSTEM
    ===================================== */

    .screen {
      display: none;

      position: relative;

      width: 100%;
      height: 100dvh;

      overflow: hidden;
    }

    .screen.active {
      display: block;

      animation:
        screenEnter 560ms
        cubic-bezier(.22, .8, .25, 1)
        both;
    }

    .screen.leaving {
      display: block;

      animation:
        screenLeave 400ms ease both;
    }

    /* =====================================
       DARK BACKGROUND
    ===================================== */

    .question-screen,
    .form-screen {
      background:
        linear-gradient(
          145deg,
          #000125 0%,
          #07113e 48%,
          #000018 100%
        );
    }

    .animated-background {
      position: absolute;
      inset: 0;

      overflow: hidden;

      pointer-events: none;
    }

    .aurora {
      position: absolute;

      width: 160%;
      height: 76%;

      left: -30%;

      border-radius: 45% 55% 48% 52%;

      filter: blur(52px);

      will-change: transform;
    }

    .aurora-one {
      top: -42%;

      opacity: 0.78;

      background:
        linear-gradient(
          108deg,
          transparent 3%,
          rgba(109, 226, 235, 0.03) 15%,
          rgba(109, 226, 235, 0.3) 38%,
          rgba(60, 105, 173, 0.3) 57%,
          rgba(22, 41, 92, 0.12) 76%,
          transparent 96%
        );

      animation:
        auroraOne 12s
        ease-in-out infinite alternate;
    }

    .aurora-two {
      top: 8%;

      opacity: 0.53;

      background:
        linear-gradient(
          112deg,
          transparent 4%,
          rgba(22, 41, 92, 0.06) 16%,
          rgba(34, 91, 148, 0.25) 35%,
          rgba(109, 226, 235, 0.32) 51%,
          rgba(45, 74, 143, 0.19) 70%,
          transparent 96%
        );

      animation:
        auroraTwo 16s
        ease-in-out infinite alternate;
    }

    .aurora-three {
      bottom: -51%;

      opacity: 0.72;

      background:
        linear-gradient(
          96deg,
          transparent 4%,
          rgba(30, 58, 122, 0.09) 18%,
          rgba(56, 114, 173, 0.25) 38%,
          rgba(109, 226, 235, 0.3) 53%,
          rgba(22, 41, 92, 0.25) 74%,
          transparent 96%
        );

      animation:
        auroraThree 19s
        ease-in-out infinite alternate;
    }

    .light-wash {
      position: absolute;

      width: 125%;
      height: 52%;

      left: -12%;
      top: 25%;

      opacity: 0.45;

      transform: rotate(-8deg);

      background:
        linear-gradient(
          90deg,
          transparent 3%,
          rgba(109, 226, 235, 0.03) 22%,
          rgba(109, 226, 235, 0.17) 48%,
          rgba(54, 92, 165, 0.13) 68%,
          transparent 95%
        );

      filter: blur(55px);

      animation:
        lightWashMove 10s
        ease-in-out infinite alternate;
    }

    .answer-glow {
      position: absolute;

      width: 70%;
      height: 72%;

      right: -20%;
      top: 17%;

      opacity: 0.42;

      border-radius: 50%;

      background:
        radial-gradient(
          ellipse at center,
          rgba(109, 226, 235, 0.22) 0%,
          rgba(30, 58, 122, 0.17) 38%,
          transparent 72%
        );

      filter: blur(55px);

      animation:
        answerGlowMove 9s
        ease-in-out infinite alternate;
    }

    .background-vignette {
      position: absolute;
      inset: 0;

      background:
        radial-gradient(
          ellipse at center,
          transparent 30%,
          rgba(0, 1, 37, 0.13) 68%,
          rgba(0, 0, 20, 0.55) 100%
        );
    }

    .noise {
      position: absolute;
      inset: 0;

      opacity: 0.03;

      background-image:
        url(
          "data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.82' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='.9'/%3E%3C/svg%3E"
        );
    }

    /* =====================================
       QUESTION PAGE
    ===================================== */

    .question-page {
      position: relative;
      z-index: 10;

      width:
        min(1080px, calc(100% - 44px));

      height: 100%;

      margin: 0 auto;

      padding:
        calc(var(--header-height) + 25px)
        0
        26px;

      display: grid;

      grid-template-rows:
        minmax(0, 1fr)
        auto;
    }

    .question-body {
      min-height: 0;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;

      padding-top:
        clamp(8px, 1.8vh, 18px);
    }

    /* =====================================
       QUESTION NUMBER ABOVE TITLE
    ===================================== */

    .question-number {
      margin-bottom:
        clamp(10px, 1.7vh, 17px);

      color:
        rgba(255, 255, 255, 0.53);

      font-size:
        clamp(10px, 0.9vw, 12px);

      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .question-number strong {
      color: var(--aqua);
      font-weight: 800;
    }

    .question-title {
      width: min(900px, 100%);

      margin:
        0
        auto
        clamp(35px, 5.3vh, 62px);

      text-align: center;

      font-size:
        clamp(34px, 4.35vw, 61px);

      font-weight: 600;
      line-height: 1.03;
      letter-spacing: -0.045em;
    }

    /* =====================================
       ANSWER GRID
    ===================================== */

    .answers {
      width: min(960px, 100%);

      display: grid;

      grid-template-columns:
        repeat(2, minmax(0, 1fr));

      gap:
        clamp(12px, 1.8vh, 18px)
        clamp(16px, 2vw, 24px);

      align-content: center;
    }

    .answers.odd-count
    .answer-card:last-child {
      grid-column: 1 / -1;

      width:
        calc(
          50% - clamp(8px, 1vw, 12px)
        );

      justify-self: center;
    }

    .answers.single-column {
      width: min(720px, 100%);

      grid-template-columns: 1fr;
    }

    .answers.single-column
    .answer-card:last-child {
      width: 100%;
      grid-column: auto;
    }

    /* =====================================
       ANSWER CARDS
    ===================================== */

    .answer-card {
      position: relative;
      isolation: isolate;

      width: 100%;

      min-height:
        clamp(58px, 7.2vh, 74px);

      display: flex;
      align-items: center;
      justify-content: center;

      padding:
        12px
        20px;

      overflow: hidden;

      border:
        1px solid
        rgba(109, 226, 235, 0.21);

      border-radius: 18px;

      color: var(--white);

      background:
        linear-gradient(
          120deg,
          rgba(13, 26, 74, 0.83),
          rgba(18, 34, 84, 0.56)
        );

      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);

      box-shadow:
        inset 0 1px 0
        rgba(255, 255, 255, 0.055),

        0 12px 32px
        rgba(0, 0, 0, 0.2);

      text-align: center;

      transform-origin: center center;

      transition:
        transform 240ms
        cubic-bezier(.2, .8, .2, 1),

        border-color 220ms ease,

        box-shadow 220ms ease,

        background 220ms ease;
    }

    .answer-card::before {
      content: "";

      position: absolute;
      z-index: -2;

      inset: 0;

      opacity: 0;

      background:
        linear-gradient(
          110deg,
          rgba(109, 226, 235, 0.11),
          rgba(109, 226, 235, 0.36) 45%,
          rgba(25, 50, 98, 0.88) 78%
        );

      transition:
        opacity 200ms ease;
    }

    .answer-card::after {
      content: "";

      position: absolute;
      z-index: -1;

      top: -50%;
      bottom: -50%;

      left: -65%;

      width: 45%;

      opacity: 0;

      transform:
        skewX(-20deg);

      background:
        linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.18),
          rgba(109, 226, 235, 0.92),
          rgba(255, 255, 255, 0.16),
          transparent
        );

      filter: blur(2px);
    }

    .answer-card:hover {
      border-color:
        rgba(109, 226, 235, 0.62);

      transform:
        scale(1.025);

      box-shadow:
        0 16px 38px
        rgba(0, 0, 0, 0.29),

        0 0 28px
        rgba(109, 226, 235, 0.13);
    }

    .answer-card.selected {
      z-index: 5;

      border-color: var(--aqua);

      background:
        linear-gradient(
          110deg,
          rgba(109, 226, 235, 0.34),
          rgba(22, 41, 92, 0.97) 58%,
          rgba(13, 26, 74, 0.97)
        );

      transform:
        scale(1.065);

      box-shadow:
        0 0 0 2px
        rgba(109, 226, 235, 0.14),

        0 18px 44px
        rgba(0, 0, 0, 0.36),

        0 0 42px
        rgba(109, 226, 235, 0.4),

        inset 0 1px 0
        rgba(255, 255, 255, 0.2);
    }

    .answer-card.selected::before {
      opacity: 1;
    }

    .answer-card.selected::after {
      opacity: 1;

      animation:
        answerSweep 820ms
        cubic-bezier(.2, .75, .2, 1)
        both;
    }

    .answer-card.selecting {
      animation:
        answerZoom 460ms
        cubic-bezier(.2, .9, .2, 1);
    }

    .answer-text {
      position: relative;
      z-index: 3;

      width: 100%;

      font-size:
        clamp(13px, 1.15vw, 16px);

      font-weight: 500;
      line-height: 1.3;
    }

    /* =====================================
       OTHER ANSWER
    ===================================== */

    .other-card {
      flex-direction: column;
    }

    .other-label {
      position: relative;
      z-index: 3;

      width: 100%;

      font-size:
        clamp(13px, 1.15vw, 16px);

      transition:
        color 180ms ease,
        font-size 180ms ease;
    }

    .other-input {
      position: relative;
      z-index: 3;

      width: 100%;
      max-height: 0;

      padding: 0;

      opacity: 0;

      border: 0;
      outline: 0;

      color: var(--white);
      background: transparent;

      text-align: center;

      font-size: 13px;

      transition:
        max-height 180ms ease,
        opacity 180ms ease,
        padding 180ms ease;
    }

    .other-card.selected
    .other-label {
      color: var(--aqua);

      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .other-card.selected
    .other-input {
      max-height: 28px;

      padding-top: 4px;

      opacity: 1;
    }

    .other-input::placeholder {
      color:
        rgba(255, 255, 255, 0.48);
    }

    /* =====================================
       AUTO ADVANCE
    ===================================== */

    .transition-progress {
      position: absolute;
      z-index: 8;

      left: 0;
      right: 0;
      bottom: 0;

      height: 3px;

      opacity: 0;

      background:
        rgba(255, 255, 255, 0.07);
    }

    .transition-progress::after {
      content: "";

      display: block;

      width: 0;
      height: 100%;

      background: var(--aqua);
    }

    .answer-card.selected
    .transition-progress {
      opacity: 1;
    }

    .answer-card.selected
    .transition-progress::after {
      animation:
        autoAdvance 760ms linear forwards;
    }

    /* =====================================
       BOTTOM PROGRESS
    ===================================== */

    .progress-area {
      width: 100%;

      margin-top:
        clamp(16px, 2.2vh, 25px);
    }

    .progress-section {
      margin-bottom: 11px;

      color:
        rgba(255, 255, 255, 0.65);

      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    /*
      Rounded progress track with separated
      internal segments.
    */

    .progress-track {
      position: relative;

      width: 100%;
      height: 15px;

      overflow: hidden;

      border:
        1px solid
        rgba(255, 255, 255, 0.12);

      border-radius: 999px;

      background:
        rgba(255, 255, 255, 0.07);

      box-shadow:
        inset 0 2px 7px
        rgba(0, 0, 0, 0.32),

        0 0 24px
        rgba(109, 226, 235, 0.06);
    }

    .progress-fill {
      position: absolute;

      top: 2px;
      bottom: 2px;
      left: 2px;

      overflow: hidden;

      border-radius: 999px;

      background:
        linear-gradient(
          90deg,
          #4bcbd6,
          var(--aqua),
          var(--aqua-light)
        );

      box-shadow:
        0 0 20px
        rgba(109, 226, 235, 0.46);

      transition:
        width 650ms
        cubic-bezier(.2, .8, .2, 1);
    }

    .progress-fill::after {
      content: "";

      position: absolute;

      top: 0;
      bottom: 0;

      width: 70px;

      left: -80px;

      background:
        linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.95),
          transparent
        );

      animation:
        progressSweep 2.5s linear infinite;
    }

    .progress-segments {
      position: absolute;
      z-index: 3;

      inset: 0;

      display: grid;
      grid-template-columns:
        repeat(15, 1fr);

      pointer-events: none;
    }

    .progress-segments span {
      border-right:
        1px solid
        rgba(0, 1, 37, 0.25);
    }

    .progress-segments span:last-child {
      border-right: 0;
    }

    /* =====================================
       INSIGHT SCREEN
    ===================================== */

    .insight-screen {
      color: var(--ink);

      background:
        linear-gradient(
          145deg,
          #d8e9ec 0%,
          var(--warm-grey) 48%,
          #d5e4e8 100%
        );
    }

    .insight-background {
      position: absolute;
      inset: 0;

      overflow: hidden;

      pointer-events: none;
    }

    .light-aurora {
      position: absolute;

      width: 160%;
      height: 75%;

      left: -30%;

      border-radius: 48% 52% 46% 54%;

      filter: blur(58px);
    }

    .light-aurora-one {
      top: -44%;

      opacity: 0.78;

      background:
        linear-gradient(
          105deg,
          transparent 5%,
          rgba(109, 226, 235, 0.09) 22%,
          rgba(109, 226, 235, 0.65) 48%,
          rgba(255, 255, 255, 0.3) 71%,
          transparent 96%
        );

      animation:
        lightAuroraOne 13s
        ease-in-out infinite alternate;
    }

    .light-aurora-two {
      bottom: -48%;

      opacity: 0.53;

      background:
        linear-gradient(
          95deg,
          transparent 4%,
          rgba(22, 41, 92, 0.11) 23%,
          rgba(109, 226, 235, 0.42) 50%,
          rgba(30, 58, 122, 0.12) 75%,
          transparent 96%
        );

      animation:
        lightAuroraTwo 17s
        ease-in-out infinite alternate;
    }

    .insight-page {
      position: relative;
      z-index: 10;

      width:
        min(1080px, calc(100% - 44px));

      height: 100%;

      margin: 0 auto;

      padding:
        calc(var(--header-height) + 34px)
        0
        30px;

      display: flex;
      align-items: center;
      justify-content: center;
    }

    .insight-card {
      position: relative;

      width: min(950px, 100%);
      max-height: 100%;

      overflow: hidden;

      border:
        1px solid
        rgba(255, 255, 255, 0.82);

      border-radius: 34px;

      background:
        linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.43),
          rgba(255, 255, 255, 0.14)
        );

      backdrop-filter:
        blur(35px)
        saturate(155%);

      -webkit-backdrop-filter:
        blur(35px)
        saturate(155%);

      box-shadow:
        inset 0 1px 0
        rgba(255, 255, 255, 0.98),

        inset 0 -1px 0
        rgba(255, 255, 255, 0.18),

        0 28px 80px
        rgba(0, 1, 37, 0.17);
    }

    .insight-card::before {
      content: "";

      position: absolute;
      inset: 0;

      pointer-events: none;

      background:
        linear-gradient(
          130deg,
          rgba(255, 255, 255, 0.52),
          transparent 28%,
          transparent 68%,
          rgba(109, 226, 235, 0.14)
        );
    }

    .insight-inner {
      position: relative;
      z-index: 2;

      display: grid;

      grid-template-columns:
        minmax(0, 1.25fr)
        minmax(245px, 0.75fr);

      gap:
        clamp(30px, 4.5vw, 62px);

      align-items: center;

      padding:
        clamp(34px, 5vw, 66px);
    }

    .stage-badge {
      display: inline-block;

      padding:
        7px
        11px;

      border:
        1px solid
        rgba(22, 41, 92, 0.13);

      border-radius: 999px;

      color: var(--royal);

      background:
        rgba(255, 255, 255, 0.3);

      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.12em;
    }

    .insight-title {
      max-width: 660px;

      margin:
        21px
        0
        18px;

      font-size:
        clamp(35px, 4.35vw, 59px);

      font-weight: 600;
      line-height: 1;
      letter-spacing: -0.048em;
    }

    .insight-copy {
      max-width: 650px;

      margin: 0;

      color:
        rgba(0, 1, 37, 0.7);

      font-size:
        clamp(14px, 1.2vw, 17px);

      line-height: 1.56;
    }

    .nxtgen-note {
      margin-top: 24px;

      padding:
        14px
        17px;

      border-left:
        4px solid
        var(--aqua);

      border-radius:
        0
        15px
        15px
        0;

      background:
        rgba(255, 255, 255, 0.26);

      color:
        rgba(0, 1, 37, 0.68);

      font-size:
        clamp(12px, 1vw, 14px);

      line-height: 1.5;
    }

    .insight-action,
    .form-submit {
      margin-top: 26px;

      padding:
        14px
        21px;

      border: 0;
      border-radius: 999px;

      color: var(--white);
      background: var(--navy);

      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.03em;

      box-shadow:
        0 14px 34px
        rgba(0, 1, 37, 0.2);

      transition:
        transform 180ms ease,
        box-shadow 180ms ease;
    }

    .insight-action:hover,
    .form-submit:hover {
      transform: translateY(-2px);

      box-shadow:
        0 18px 42px
        rgba(0, 1, 37, 0.28);
    }

    .stat-panel {
      position: relative;

      min-height: 325px;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      padding: 28px;

      overflow: hidden;

      border:
        1px solid
        rgba(255, 255, 255, 0.62);

      border-radius: 27px;

      color: var(--white);

      background:
        linear-gradient(
          145deg,
          rgba(22, 41, 92, 0.96),
          rgba(0, 1, 37, 0.99)
        );

      text-align: center;

      box-shadow:
        0 20px 50px
        rgba(0, 1, 37, 0.2);
    }

    .stat-panel::before {
      content: "";

      position: absolute;

      width: 160%;
      height: 72%;

      left: -30%;
      top: -24%;

      border-radius: 50%;

      background:
        linear-gradient(
          100deg,
          transparent,
          rgba(109, 226, 235, 0.4),
          rgba(60, 105, 173, 0.19),
          transparent
        );

      filter: blur(30px);

      animation:
        statWaveMovement 7s
        ease-in-out infinite alternate;
    }

    .stat-number {
      position: relative;
      z-index: 2;

      color: var(--aqua);

      font-size:
        clamp(68px, 8vw, 108px);

      font-weight: 600;
      line-height: 0.85;
      letter-spacing: -0.07em;

      text-shadow:
        0 0 35px
        rgba(109, 226, 235, 0.34);
    }

    .stat-label {
      position: relative;
      z-index: 2;

      max-width: 230px;

      margin-top: 22px;

      font-size:
        clamp(13px, 1.15vw, 16px);

      line-height: 1.45;
    }

    .stat-source {
      position: relative;
      z-index: 2;

      margin-top: 18px;

      color:
        rgba(255, 255, 255, 0.5);
